<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>框选二维码</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        cursor: crosshair;
        user-select: none;
      }

      body {
        background: rgba(14, 18, 28, 0.26);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      .hint {
        position: fixed;
        top: 26px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.36);
        border-radius: 999px;
        background: rgba(20, 24, 34, 0.76);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24);
        color: #fff;
        font-size: 13px;
        font-weight: 750;
        letter-spacing: 0;
      }

      .selection {
        position: fixed;
        display: none;
        border: 2px solid #4d8cff;
        border-radius: 8px;
        background: rgba(77, 140, 255, 0.14);
        box-shadow:
          0 0 0 9999px rgba(7, 10, 18, 0.38),
          0 12px 38px rgba(0, 0, 0, 0.28);
      }

      .size {
        position: absolute;
        right: 0;
        bottom: -30px;
        padding: 4px 7px;
        border-radius: 8px;
        background: rgba(20, 24, 34, 0.82);
        color: #fff;
        font-size: 12px;
        font-weight: 750;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="hint">拖拽框选二维码，松开后自动识别，Esc 取消</div>
    <div class="selection" id="selection">
      <div class="size" id="size">0 x 0</div>
    </div>
    <script>
      const selection = document.querySelector('#selection');
      const size = document.querySelector('#size');
      let startX = 0;
      let startY = 0;
      let selecting = false;

      function rectFromPoints(x1, y1, x2, y2) {
        const x = Math.min(x1, x2);
        const y = Math.min(y1, y2);
        const width = Math.abs(x2 - x1);
        const height = Math.abs(y2 - y1);
        return { x, y, width, height };
      }

      function draw(rect) {
        selection.style.display = 'block';
        selection.style.left = `${rect.x}px`;
        selection.style.top = `${rect.y}px`;
        selection.style.width = `${rect.width}px`;
        selection.style.height = `${rect.height}px`;
        size.textContent = `${Math.round(rect.width)} x ${Math.round(rect.height)}`;
      }

      window.addEventListener('mousedown', (event) => {
        selecting = true;
        startX = event.clientX;
        startY = event.clientY;
        draw(rectFromPoints(startX, startY, startX, startY));
      });

      window.addEventListener('mousemove', (event) => {
        if (!selecting) return;
        draw(rectFromPoints(startX, startY, event.clientX, event.clientY));
      });

      window.addEventListener('mouseup', (event) => {
        if (!selecting) return;
        selecting = false;
        const rect = rectFromPoints(startX, startY, event.clientX, event.clientY);
        if (rect.width < 8 || rect.height < 8) {
          window.screenshotPicker.cancel();
          return;
        }
        window.screenshotPicker.complete({
          x: Math.round(rect.x),
          y: Math.round(rect.y),
          width: Math.round(rect.width),
          height: Math.round(rect.height)
        });
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') window.screenshotPicker.cancel();
      });
    </script>
  </body>
</html>
